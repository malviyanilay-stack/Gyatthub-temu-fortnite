<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TEMU FORTNITE: BATTLE ROYALE</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <style>
        :root {
            --ui-blue-bright: #38bdf8;
            --ui-border: #334155;
            --health-color: #22c55e;  /* Fortnite Green HP */
            --shield-color: #3b82f6;  /* Fortnite Blue Shield */
            --mana-color: #a855f7;    /* Resource/Mana Pool */
            --font-stack: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * { box-sizing: border-box; user-select: none; margin: 0; padding: 0; font-family: var(--font-stack); }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #87CEEB; touch-action: none; }
        #canvas-viewport { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }

        /* ==================== LOBBY ==================== */
        #deployment-lobby {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.9), rgba(30, 41, 59, 0.9));
            backdrop-filter: blur(12px); z-index: 500; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .lobby-panel {
            background: rgba(15, 23, 42, 0.95); border: 2px solid var(--ui-blue-bright); border-radius: 12px;
            padding: 50px; width: 90%; max-width: 550px; text-align: center; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
        }
        .main-title { font-size: 3.5rem; color: #ffffff; font-weight: 900; margin-bottom: 25px; text-transform: uppercase; text-shadow: 3px 3px 0px #000; }
        .ui-label { display: block; color: #94a3b8; text-align: left; font-size: 0.9rem; font-weight: bold; text-transform: uppercase; margin-bottom: 6px; }
        .ui-input { width: 100%; padding: 14px; margin-bottom: 25px; border-radius: 6px; border: 1px solid var(--ui-border); background: #1e293b; color: #ffffff; font-size: 1.2rem; text-align: center; outline: none; }
        .btn-deploy { width: 100%; padding: 18px; background: linear-gradient(180deg, #38bdf8, #0284c7); color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 1.4rem; cursor: pointer; text-transform: uppercase; }

        /* ==================== HUD & CHAT ==================== */
        .game-hud-layer { position: absolute; left: 0; top: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 25px; }
        .hud-interactive { pointer-events: auto; }
        
        #chat-terminal {
            width: 450px; height: 320px; background: rgba(15, 23, 42, 0.85); border: 2px solid var(--ui-blue-bright);
            border-radius: 8px; display: flex; flex-direction: column; padding: 12px;
        }
        .chat-header { color: var(--ui-blue-bright); font-weight: 800; font-size: 0.9rem; margin-bottom: 8px; border-bottom: 2px solid var(--ui-border); padding-bottom: 6px; }
        #chat-output { flex-grow: 1; overflow-y: auto; color: #f8fafc; font-size: 0.9rem; display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
        .msg { padding: 6px 10px; background: rgba(30, 41, 59, 0.7); border-left: 3px solid #64748b; border-radius: 4px; }
        #chat-input { width: 100%; padding: 10px; background: #0f172a; color: #ffffff; border: 1px solid var(--ui-border); border-radius: 4px; outline: none; }

        /* DASHBOARD - HP, SHIELD, MANA */
        .vitals-dashboard { background: rgba(15, 23, 42, 0.9); padding: 20px; border-radius: 8px; width: 320px; border-top: 4px solid var(--ui-blue-bright); align-self: flex-start; }
        .vital-label { color: #cbd5e1; font-size: 0.8rem; font-weight: 800; margin-top: 10px; text-transform: uppercase; }
        .bar-track { width: 100%; height: 18px; background: #020617; border-radius: 9px; overflow: hidden; margin-top: 4px; border: 1px solid var(--ui-border); }
        
        .fill-hp { height: 100%; background: var(--health-color); width: 100%; transition: width 0.15s ease-out; }
        .fill-sh { height: 100%; background: var(--shield-color); width: 0%; transition: width 0.15s ease-out; }
        .fill-mn { height: 100%; background: var(--mana-color); width: 100%; transition: width 0.15s ease-out; }

        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 10px; height: 10px; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: white; box-shadow: 0 0 3px rgba(0,0,0,0.8); }
        #crosshair::before { top: 4px; left: -5px; width: 20px; height: 2px; }
        #crosshair::after { top: -5px; left: 4px; width: 2px; height: 20px; }

        /* CONTROLS */
        #trackpad-move { position: absolute; left: 0; bottom: 0; width: 45%; height: 55%; }
        #trackpad-look { position: absolute; right: 0; bottom: 0; width: 45%; height: 55%; }
        
        .action-btn { position: absolute; width: 85px; height: 85px; border-radius: 50%; background: rgba(15, 23, 42, 0.7); border: 3px solid #64748b; color: white; font-weight: 900; display: flex; justify-content: center; align-items: center; }
        #btn-fire { right: 35px; bottom: 35px; background: rgba(239, 68, 68, 0.5); }
        #btn-jump { right: 135px; bottom: 35px; background: rgba(56, 189, 248, 0.5); }
        #btn-ability { right: 85px; bottom: 135px; background: rgba(168, 85, 247, 0.5); }
    </style>
</head>
<body>

    <div id="canvas-viewport"></div>

    <div id="deployment-lobby" class="hud-interactive">
        <div class="lobby-panel">
            <h1 class="main-title">Temu Fortnite</h1>
            <label class="ui-label">Player Username</label>
            <input type="text" id="input-username" class="ui-input" value="Sweat_Builder">
            
            <label class="ui-label">Fortnite Loadout</label>
            <select id="input-loadout" class="ui-input">
                <option value="wall">Build: Wood Wall (Cost: 50 Mana)</option>
                <option value="shield">Consumable: Mini Shield (+25 Shield)</option>
                <option value="shotgun">Weapon: Tactical Shotgun (Spread Shot)</option>
            </select>
            
            <button class="btn-deploy" id="btn-start">Drop From Bus</button>
        </div>
    </div>

    <div class="game-hud-layer" id="game-ui" style="display: none;">
        <div style="display: flex; justify-content: space-between; width: 100%; pointer-events: none;">
            <div id="chat-terminal" class="hud-interactive">
                <div class="chat-header">Global Comms</div>
                <div id="chat-output"></div>
                <input type="text" id="chat-input" placeholder="Chat here...">
            </div>

            <div class="vitals-dashboard">
                <div id="hud-name" style="color: white; font-size: 1.3rem; font-weight: 900;"></div>
                
                <div class="vital-label">Health (HP)</div>
                <div class="bar-track"><div class="fill-hp" id="bar-hp"></div></div>
                
                <div class="vital-label">Shield (AP)</div>
                <div class="bar-track"><div class="fill-sh" id="bar-sh"></div></div>

                <div class="vital-label">Mana / Mats (Max 200%)</div>
                <div class="bar-track"><div class="fill-mn" id="bar-mana"></div></div>
            </div>
        </div>

        <div id="crosshair"></div>
        <div id="trackpad-move" class="hud-interactive"></div>
        <div id="trackpad-look" class="hud-interactive"></div>
        
        <div id="btn-fire" class="action-btn hud-interactive">AR</div>
        <div id="btn-jump" class="action-btn hud-interactive">JUMP</div>
        <div id="btn-ability" class="action-btn hud-interactive">SKILL</div>
    </div>

    <script>
        const VENDOR_SERVER_LINK = "https://temu-fortnight.onrender.com/";

        const CONFIG = {
            world: { skyColor: 0x87CEEB, groundColor: 0x55a630 },
            player: { speed: 20, jump: 16, maxHp: 100, maxShield: 100, maxMana: 200 } // Mana max rigidly set to 200%
        };

        // --- PARTICLE ENGINE (For Shotgun Sparks & Building Dust) ---
        class ParticleSystemController {
            constructor(scene) {
                this.scene = scene;
                this.pool = 1000;
                this.posArray = new Float32Array(this.pool * 3);
                this.vels = [];
                this.lives = [];

                for (let i = 0; i < this.pool; i++) {
                    this.posArray[i * 3] = 0; this.posArray[i * 3 + 1] = -5000; this.posArray[i * 3 + 2] = 0;
                    this.vels.push(new THREE.Vector3());
                    this.lives.push(0);
                }

                const geo = new THREE.BufferGeometry();
                geo.setAttribute('position', new THREE.BufferAttribute(this.posArray, 3));
                this.mat = new THREE.PointsMaterial({ size: 0.4, color: 0xffddaa, transparent: true, opacity: 0.8 });
                this.mesh = new THREE.Points(geo, this.mat);
                this.scene.add(this.mesh);
            }

            burst(pos, count, color) {
                this.mat.color.setHex(color);
                let spawned = 0;
                for (let i = 0; i < this.pool; i++) {
                    if (this.lives[i] <= 0) {
                        this.posArray[i*3] = pos.x; this.posArray[i*3+1] = pos.y; this.posArray[i*3+2] = pos.z;
                        this.vels[i].set((Math.random()-0.5)*15, Math.random()*10+5, (Math.random()-0.5)*15);
                        this.lives[i] = 0.5 + Math.random()*0.5;
                        spawned++;
                        if (spawned >= count) break;
                    }
                }
                this.mesh.geometry.attributes.position.needsUpdate = true;
            }

            update(delta) {
                let active = false;
                for (let i = 0; i < this.pool; i++) {
                    if (this.lives[i] > 0) {
                        active = true;
                        this.lives[i] -= delta;
                        this.vels[i].y -= 25 * delta;
                        this.posArray[i*3] += this.vels[i].x * delta;
                        this.posArray[i*3+1] += this.vels[i].y * delta;
                        this.posArray[i*3+2] += this.vels[i].z * delta;
                        if (this.lives[i] <= 0) this.posArray[i*3+1] = -5000;
                    }
                }
                if (active) this.mesh.geometry.attributes.position.needsUpdate = true;
            }
        }

        // --- NON-ROBLOX MULTI-LIMB RIG ---
        class HumanoidModelRig {
            constructor(scene, hexColor) {
                this.group = new THREE.Group();
                this.scene = scene;
                this.animTime = 0;

                const matBody = new THREE.MeshStandardMaterial({ color: hexColor });
                const matSkin = new THREE.MeshStandardMaterial({ color: 0xffe0bd });

                this.torso = new THREE.Mesh(new THREE.BoxGeometry(1.4, 1.8, 0.8), matBody);
                this.torso.position.y = 1.9;
                this.group.add(this.torso);

                this.head = new THREE.Mesh(new THREE.BoxGeometry(0.85, 0.85, 0.85), matSkin);
                this.head.position.y = 1.35;
                this.torso.add(this.head);

                this.armL = new THREE.Group(); this.armL.position.set(-0.95, 0.7, 0);
                const aL = new THREE.Mesh(new THREE.BoxGeometry(0.45, 1.5, 0.45), matSkin); aL.position.y = -0.65;
                this.armL.add(aL); this.torso.add(this.armL);

                this.armR = new THREE.Group(); this.armR.position.set(0.95, 0.7, 0);
                const aR = new THREE.Mesh(new THREE.BoxGeometry(0.45, 1.5, 0.45), matSkin); aR.position.y = -0.65;
                this.armR.add(aR); this.torso.add(this.armR);

                this.legL = new THREE.Group(); this.legL.position.set(-0.4, -0.9, 0);
                const lL = new THREE.Mesh(new THREE.BoxGeometry(0.55, 1.6, 0.55), matBody); lL.position.y = -0.8;
                this.legL.add(lL); this.torso.add(this.legL);

                this.legR = new THREE.Group(); this.legR.position.set(0.4, -0.9, 0);
                const lR = new THREE.Mesh(new THREE.BoxGeometry(0.55, 1.6, 0.55), matBody); lR.position.y = -0.8;
                this.legR.add(lR); this.torso.add(this.legR);

                this.scene.add(this.group);
            }

            animate(speed, delta) {
                if (speed > 0.2) {
                    this.animTime += delta * 15;
                    const swing = Math.sin(this.animTime) * 0.8;
                    this.armL.rotation.x = swing; this.armR.rotation.x = -swing;
                    this.legL.rotation.x = -swing; this.legR.rotation.x = swing;
                } else {
                    this.armL.rotation.x *= 0.8; this.armR.rotation.x *= 0.8;
                    this.legL.rotation.x *= 0.8; this.legR.rotation.x *= 0.8;
                }
            }
        }
        // ================= END OF PART 1 =================
