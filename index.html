<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TEMU FORTNITE</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        /* =========================================
           UI & CSS STYLING
           ========================================= */
        :root {
            --theme-primary: #f97316;
            --theme-dark: #090e17; /* Darkened Theme */
            --theme-light: #f8fafc;
            --theme-accent: #3b82f6;
            --rarity-common: #94a3b8;
            --rarity-rare: #3b82f6;
            --rarity-legendary: #fbbf24;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Impact, Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--theme-dark);
            touch-action: none; /* Crucial for custom multi-touch */
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            left: 0;
            top: 0;
            z-index: 1;
        }

        /* Lobby & Menus */
        #lobby-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(9,14,23,0.95), rgba(0,0,0,1));
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--theme-light);
            backdrop-filter: blur(8px);
        }

        .main-panel {
            background: rgba(15, 23, 42, 0.95);
            border: 3px solid var(--theme-primary);
            border-radius: 16px;
            padding: 40px;
            width: 90%;
            max-width: 550px;
            text-align: center;
            box-shadow: 0 0 50px rgba(249, 115, 22, 0.3), inset 0 0 30px rgba(0,0,0,0.9);
            transform: scale(0.95);
            opacity: 0; 
        }

        .title-glitch {
            font-size: 3.8rem;
            margin-bottom: 5px;
            color: var(--theme-primary);
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 4px 4px 0px rgba(255,255,255,0.05);
            font-weight: 900;
            font-style: italic;
        }

        .subtitle {
            color: #cbd5e1;
            margin-bottom: 30px;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        input {
            width: 100%; padding: 18px; margin: 12px 0;
            border-radius: 8px; border: 2px solid #1e293b;
            background: rgba(9, 14, 23, 0.8); color: white;
            font-size: 1.2rem; text-align: center;
            transition: border-color 0.3s;
        }
        
        input:focus { 
            outline: none; 
            border-color: var(--theme-primary); 
        }

        .btn-primary {
            width: 100%; padding: 20px;
            background: linear-gradient(45deg, var(--theme-primary), #ea580c);
            color: white; border: none; border-radius: 8px;
            font-weight: 900; font-size: 1.4rem;
            cursor: pointer; margin-top: 20px;
            text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 6px 0 #9a3412;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        
        .btn-primary:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 #9a3412;
        }

        /* Laptop Controls Toggle */
        #btn-laptop {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(15, 23, 42, 0.8);
            border: 2px solid var(--theme-accent);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            z-index: 50;
            cursor: pointer;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: all 0.2s;
        }
        
        #btn-laptop:hover {
            background: rgba(59, 130, 246, 0.4);
        }

        .render-link-btn {
            background: transparent;
            color: var(--theme-accent);
            border: 1px solid var(--theme-accent);
            padding: 12px; border-radius: 6px;
            margin-top: 25px; cursor: pointer;
            font-size: 1rem; transition: background 0.2s;
        }
        
        .render-link-btn:hover { 
            background: rgba(59, 130, 246, 0.2); 
        }

        /* HUD Structure */
        .hud-layer {
            position: absolute; z-index: 10; pointer-events: none;
            width: 100%; height: 100%; display: flex; flex-direction: column;
            justify-content: space-between; padding: 20px;
        }

        .interactive { pointer-events: auto; }

        .hud-top { display: flex; justify-content: space-between; width: 100%; margin-top: 50px; }

        .leaderboard {
            background: rgba(9, 14, 23, 0.85);
            border-left: 5px solid var(--theme-primary);
            padding: 15px; border-radius: 0 8px 8px 0;
            color: white; min-width: 220px;
            backdrop-filter: blur(6px);
        }
        
        .leaderboard h3 { font-size: 1.2rem; margin-bottom: 12px; letter-spacing: 1px; }
        .lb-entry { display: flex; justify-content: space-between; font-size: 1rem; margin-bottom: 8px; }

        .player-stats {
            background: rgba(9, 14, 23, 0.85);
            padding: 15px 30px; border-radius: 8px; color: white; text-align: right;
            border-right: 5px solid var(--theme-primary);
            backdrop-filter: blur(6px);
        }
        
        .stat-health { font-size: 1.6rem; font-weight: bold; color: #4ade80; }
        .stat-shield { font-size: 1.4rem; font-weight: bold; color: #60a5fa; margin-bottom: 5px; }
        .weapon-info { margin-top: 12px; font-size: 1.1rem; color: #cbd5e1; }
        
        .tier-legendary { color: var(--rarity-legendary); font-weight: bold; text-shadow: 0 0 8px rgba(251, 191, 36, 0.6); }
        .tier-rare { color: var(--rarity-rare); font-weight: bold; }
        .tier-common { color: var(--rarity-common); font-weight: bold; }

        /* Bottom HUD & Mobile Controls */
        .hud-bottom { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-end; 
            width: 100%; 
            height: 50%;
        }

        /* Dynamic Joystick (Hidden by default, spawned on touch) */
        #dynamic-joystick {
            position: absolute;
            width: 140px; height: 140px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            display: none; 
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 20;
        }
        
        #dynamic-knob {
            width: 50px; height: 50px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%; 
            position: absolute;
            left: 45px; top: 45px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }

        .action-cluster { 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            position: absolute;
            right: 30px;
            bottom: 30px;
        }
        
        .action-btn {
            width: 85px; height: 85px; border-radius: 50%;
            background: rgba(15, 23, 42, 0.75);
            border: 3px solid rgba(255, 255, 255, 0.4);
            color: white; font-weight: bold; font-size: 1.1rem;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 6px 20px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            transition: background 0.1s;
        }
        
        .action-btn:active { 
            transform: scale(0.9); 
            background: rgba(15, 23, 42, 0.95); 
        }
        
        #fire-btn { 
            background: rgba(249, 115, 22, 0.8); 
            width: 110px; height: 110px; 
            font-size: 1.4rem; 
            border-color: var(--theme-primary); 
        }
        
        #fire-btn:active { 
            background: rgba(194, 65, 12, 1); 
        }

        /* Crosshair */
        #reticle {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 28px; height: 28px; pointer-events: none; z-index: 5;
        }
        
        .reticle-line { position: absolute; background: rgba(255,255,255,1); box-shadow: 0 0 3px black; }
        .rt-h { top: 13px; left: 0; width: 28px; height: 2px; }
        .rt-v { top: 0; left: 13px; width: 2px; height: 28px; }
        .rt-dot { top: 12px; left: 12px; width: 4px; height: 4px; border-radius: 50%; background: #ef4444; position: absolute; }

        /* Killfeed */
        #killfeed {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; gap: 8px; pointer-events: none;
        }
        
        .kill-msg {
            background: rgba(0,0,0,0.7); color: white; padding: 8px 20px;
            border-radius: 6px; font-size: 1rem; font-weight: bold; text-align: center;
            border-bottom: 3px solid var(--theme-primary);
        }

    </style>
</head>
<body>

    <div id="lobby-overlay" class="interactive">
        <div class="main-panel" id="main-panel">
            <h1 class="title-glitch">TEMU FORTNITE</h1>
            <p class="subtitle">Drop In. Gear Up. Survive.</p>
            
            <input type="text" id="player-name" placeholder="Enter Username" value="Guest" maxlength="12">
            <input type="text" id="room-code" placeholder="Room Code (Leave blank for Solo)" maxlength="8">
            
            <button class="btn-primary" id="btn-deploy">DEPLOY TO ISLAND</button>
            
            <button class="render-link-btn" id="btn-copy-link">
                🔗 Copy Server Render Link to Invite
            </button>
            <div id="link-toast" style="display:none; color:#4ade80; font-size:0.9rem; margin-top:10px;">Link Copied to Clipboard!</div>

            <div style="color: #94a3b8; font-size: 0.9rem; margin-top: 30px; line-height: 1.6;">
                <strong>LAPTOP MODE:</strong> WASD Move | Mouse Look | Left Click Fire<br>
                <strong>MOBILE MODE:</strong> Left side Move | Right side Drag Look & Pinch Zoom | Tap Buttons
            </div>
        </div>
    </div>

    <button id="btn-laptop" class="interactive">💻 LAPTOP CONTROLS</button>

    <div class="hud-layer">
        <div id="killfeed"></div>

        <div class="hud-top">
            <div class="leaderboard interactive">
                <h3>🏆 SQUAD KILLS</h3>
                <div id="leaderboard-data">
                    </div>
            </div>
            
            <div class="player-stats interactive">
                <div class="stat-shield" id="ui-shield">SHIELD: 50</div>
                <div class="stat-health" id="ui-health">HP: 100</div>
                <div class="weapon-info" id="ui-weapon">
                    WEAPON: <span class="tier-common">Basic Blaster</span>
                </div>
            </div>
        </div>

        <div id="reticle">
            <div class="reticle-line rt-h"></div>
            <div class="reticle-line rt-v"></div>
            <div class="rt-dot"></div>
        </div>

        <div class="hud-bottom">
            <div id="dynamic-joystick">
                <div id="dynamic-knob"></div>
            </div>

            <div class="action-cluster interactive" id="mobile-actions">
                <button class="action-btn" id="btn-jump">JUMP</button>
                <button class="action-btn" id="fire-btn">FIRE</button>
            </div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script>
        /**
         * ============================================================================
         * TEMU FORTNITE ENGINE V2.0 - MASSIVE EXPANSION
         * ============================================================================
         * Features: 
         * - Multi-touch Dynamic Joystick & Camera Gestures
         * - Procedural Instanced Environment (Grass, Trees)
         * - Darker Color Palettes
         * - Advanced AI State Machines
         * - Complex Tiered Combat
         * ============================================================================
         */

        // --- PREVENT BROWSER DEFAULT GESTURES ---
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('touchstart', (e) => { 
            if (e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT') {
                e.preventDefault(); 
            }
        }, { passive: false });

        // --- GLOBAL CONFIGURATION & CONSTANTS ---
        const CONFIG = {
            WORLD_SIZE: 800,
            GRAVITY: 28.0,
            RENDER_URL: "https://temufortnite.onrender.com/",
            MAX_BOTS: 25,
            SPAWN_RATE: 3.0,
            GRASS_COUNT: 15000,
            TREE_COUNT: 400,
            COLORS: {
                SKY: 0x111827,         // Darker Night Sky
                FOG: 0x0f172a,         // Darker Fog
                GROUND: 0x142e12,      // Darker Green Ground
                SKIN: 0xc49a6c,        // Slightly darker skin tone
                ENEMY_SKIN: 0x660000,  // Darker maroon for enemies
                TRACER: 0xffaa00,
                DAMAGE: 0xff2222,
                HEAL: 0x22ff22,
                WOOD: 0x2b1d14,
                LEAVES: 0x0d3b1b
            }
        };

        // --- TIERED WEAPON SYSTEM (EXPANDED) ---
        const WEAPON_TIERS = {
            COMMON: { name: "Basic Blaster", type: "common", damage: 15, cooldown: 0.4, color: 0x94a3b8, moves: 1, spread: 0.02 },
            RARE: { name: "Assault Rifle", type: "rare", damage: 25, cooldown: 0.15, color: 0x3b82f6, moves: 3, spread: 0.05 },
            LEGENDARY_ELECTRO: { name: "Storm Surge (Electro)", type: "legendary", damage: 45, cooldown: 0.12, color: 0xeab308, moves: 5, effect: 'shock', spread: 0.08 },
            LEGENDARY_INFERNO: { name: "Hellfire (Inferno)", type: "legendary", damage: 60, cooldown: 0.6, color: 0xef4444, moves: 8, effect: 'burn', spread: 0.15 },
            LEGENDARY_DELUGE: { name: "Tsunami (Deluge)", type: "legendary", damage: 35, cooldown: 0.08, color: 0x06b6d4, moves: 6, effect: 'slow', spread: 0.04 },
            LEGENDARY_GLACIER: { name: "Permafrost (Glacier)", type: "legendary", damage: 90, cooldown: 1.5, color: 0xe0f2fe, moves: 1, effect: 'freeze', spread: 0.01 },
            LEGENDARY_SPEED: { name: "Velocity (Top Speed)", type: "legendary", damage: 20, cooldown: 0.05, color: 0xa855f7, moves: 4, effect: 'haste', spread: 0.06 }
        };

        // --- GLOBAL STATE MANAGEMENT ---
        const State = {
            active: false,
            localPlayer: null,
            cameraDistance: 6.0, // Distance for Orbit/Zoom. 0 = FPS
            cameraTheta: 0,      // Horizontal orbit angle
            cameraPhi: Math.PI / 3, // Vertical orbit angle
            actors: new Map(),
            sceneryData: [],
            projectiles: [],
            particles: [],
            clock: new THREE.Clock(),
            spawnTimer: 0,
            controlsMode: 'mobile', // 'mobile' or 'laptop'
            roomCode: ""
        };

        // --- INPUT CONTROLLER (Multi-touch & Laptop Integration) ---
        class InputController {
            constructor() {
                this.forward = 0;
                this.backward = 0;
                this.left = 0;
                this.right = 0;
                this.jump = false;
                this.fire = false;
                
                // Mouse/Laptop specific
                this.lookX = 0;
                this.lookY = 0;
                this.pointerLocked = false;

                // Touch specific
                this.touches = new Map();
                this.joyId = null;
                this.joyOrigin = new THREE.Vector2();
                this.lookId = null;
                this.lastLookPos = new THREE.Vector2();
                
                // Zoom Gestures
                this.pinchDist = 0;

                this.bindEvents();
            }

            bindEvents() {
                // LAPTOP TOGGLE LOGIC
                const laptopBtn = document.getElementById('btn-laptop');
                laptopBtn.addEventListener('click', () => {
                    if (State.controlsMode === 'mobile') {
                        State.controlsMode = 'laptop';
                        laptopBtn.innerText = "📱 MOBILE CONTROLS";
                        laptopBtn.style.background = "rgba(249, 115, 22, 0.8)"; // Orange for active
                        document.getElementById('mobile-actions').style.display = 'none';
                        if(State.active) document.body.requestPointerLock();
                    } else {
                        State.controlsMode = 'mobile';
                        laptopBtn.innerText = "💻 LAPTOP CONTROLS";
                        laptopBtn.style.background = "rgba(15, 23, 42, 0.8)";
                        document.getElementById('mobile-actions').style.display = 'flex';
                        document.exitPointerLock();
                    }
                });

                // KEYBOARD (Laptop Mode)
                const handleKey = (e, isDown) => {
                    if (State.controlsMode !== 'laptop') return;
                    switch(e.code) {
                        case 'KeyW': this.forward = isDown ? 1 : 0; break;
                        case 'KeyS': this.backward = isDown ? 1 : 0; break;
                        case 'KeyA': this.left = isDown ? 1 : 0; break;
                        case 'KeyD': this.right = isDown ? 1 : 0; break;
                        case 'Space': if(isDown) this.jump = true; break;
                    }
                };
                document.addEventListener('keydown', e => handleKey(e, true));
                document.addEventListener('keyup', e => handleKey(e, false));

                // MOUSE (Laptop Mode)
                document.addEventListener('click', (e) => {
                    if (State.active && State.controlsMode === 'laptop' && e.target.tagName !== 'BUTTON') {
                        document.body.requestPointerLock();
                    }
                });
                
                document.addEventListener('pointerlockchange', () => {
                    this.pointerLocked = (document.pointerLockElement === document.body);
                });

                document.addEventListener('mousemove', e => {
                    if (this.pointerLocked) {
                        // Orbit camera logic for mouse
                        State.cameraTheta -= e.movementX * 0.005;
                        State.cameraPhi -= e.movementY * 0.005;
                        State.cameraPhi = THREE.MathUtils.clamp(State.cameraPhi, 0.1, Math.PI - 0.1);
                        
                        // Sync player body rotation if in FPS
                        if(State.cameraDistance === 0 && State.localPlayer) {
                            State.localPlayer.mesh.rotation.y = State.cameraTheta;
                        }
                    }
                });

                document.addEventListener('mousedown', e => { if(this.pointerLocked && e.button===0) this.fire = true; });
                document.addEventListener('mouseup', e => { if(e.button===0) this.fire = false; });
                
                // MOUSE WHEEL (Zoom for Laptop)
                document.addEventListener('wheel', e => {
                    if (State.controlsMode === 'laptop') {
                        State.cameraDistance += e.deltaY * 0.01;
                        State.cameraDistance = THREE.MathUtils.clamp(State.cameraDistance, 0, 15);
                    }
                });

                // ==========================================
                // MULTI-TOUCH MOBILE CONTROLS
                // ==========================================
                const joyUI = document.getElementById('dynamic-joystick');
                const knobUI = document.getElementById('dynamic-knob');
                const halfWidth = window.innerWidth / 2;

                document.addEventListener('touchstart', e => {
                    if (State.controlsMode !== 'mobile' || !State.active) return;
                    
                    for (let i=0; i<e.changedTouches.length; i++) {
                        const t = e.changedTouches[i];
                        this.touches.set(t.identifier, t);

                        // Check if touch is on Action Buttons
                        if(t.target.id === 'btn-jump') { this.jump = true; continue; }
                        if(t.target.id === 'fire-btn') { this.fire = true; continue; }

                        // Left Screen = Dynamic Joystick
                        if (t.clientX < halfWidth && this.joyId === null) {
                            this.joyId = t.identifier;
                            this.joyOrigin.set(t.clientX, t.clientY);
                            
                            // Show and position joystick UI
                            joyUI.style.display = 'block';
                            joyUI.style.left = `${t.clientX}px`;
                            joyUI.style.top = `${t.clientY}px`;
                            knobUI.style.transform = `translate(0px, 0px)`;
                        }
                        // Right Screen = Camera Drag / Zoom
                        else if (t.clientX >= halfWidth && this.lookId === null) {
                            this.lookId = t.identifier;
                            this.lastLookPos.set(t.clientX, t.clientY);
                        }
                    }
                    
                    // Handle Pinch Zoom initialization
                    const activeTouches = Array.from(this.touches.values());
                    if (activeTouches.length >= 2) {
                        const t1 = activeTouches[0];
                        const t2 = activeTouches[1];
                        const dx = t1.clientX - t2.clientX;
                        const dy = t1.clientY - t2.clientY;
                        this.pinchDist = Math.sqrt(dx*dx + dy*dy);
                    }
                }, {passive: false});

                document.addEventListener('touchmove', e => {
                    if (State.controlsMode !== 'mobile' || !State.active) return;
                    
                    for(let i=0; i<e.changedTouches.length; i++) {
                        const t = e.changedTouches[i];
                        this.touches.set(t.identifier, t);

                        // Update Joystick
                        if (t.identifier === this.joyId) {
                            let dx = t.clientX - this.joyOrigin.x;
                            let dy = t.clientY - this.joyOrigin.y;
                            const dist = Math.sqrt(dx*dx + dy*dy);
                            const maxDist = 50; // Radius of outer ring
                            
                            if (dist > maxDist) {
                                dx = (dx/dist) * maxDist;
                                dy = (dy/dist) * maxDist;
                            }
                            
                            knobUI.style.transform = `translate(${dx}px, ${dy}px)`;
                            
                            // Normalize to 0-1 for engine
                            this.left = dx < -5 ? Math.abs(dx)/maxDist : 0;
                            this.right = dx > 5 ? dx/maxDist : 0;
                            this.forward = dy < -5 ? Math.abs(dy)/maxDist : 0;
                            this.backward = dy > 5 ? dy/maxDist : 0;
                        }
                        
                        // Update Look Camera (Roblox Style Drag)
                        if (t.identifier === this.lookId) {
                            // Check if pinching instead of dragging
                            if (this.touches.size >= 2) continue; 

                            const dx = t.clientX - this.lastLookPos.x;
                            const dy = t.clientY - this.lastLookPos.y;
                            
                            State.cameraTheta -= dx * 0.008;
                            State.cameraPhi -= dy * 0.008;
                            State.cameraPhi = THREE.MathUtils.clamp(State.cameraPhi, 0.1, Math.PI - 0.1);
                            
                            this.lastLookPos.set(t.clientX, t.clientY);
                        }
                    }

                    // Handle active pinching for zoom
                    if (this.touches.size >= 2) {
                        const activeTouches = Array.from(this.touches.values());
                        const t1 = activeTouches[0];
                        const t2 = activeTouches[1];
                        const dx = t1.clientX - t2.clientX;
                        const dy = t1.clientY - t2.clientY;
                        const newDist = Math.sqrt(dx*dx + dy*dy);
                        
                        const diff = this.pinchDist - newDist;
                        State.cameraDistance += diff * 0.05;
                        State.cameraDistance = THREE.MathUtils.clamp(State.cameraDistance, 0, 15);
                        
                        this.pinchDist = newDist;
                    }
                }, {passive: false});

                document.addEventListener('touchend', e => {
                    if (State.controlsMode !== 'mobile') return;
                    
                    for(let i=0; i<e.changedTouches.length; i++) {
                        const t = e.changedTouches[i];
                        this.touches.delete(t.identifier);

                        if(t.target.id === 'fire-btn') this.fire = false;

                        if (t.identifier === this.joyId) {
                            this.joyId = null;
                            joyUI.style.display = 'none';
                            this.forward = 0; this.backward = 0; this.left = 0; this.right = 0;
                        }
                        
                        if (t.identifier === this.lookId) {
                            this.lookId = null;
                        }
                    }
                });
            }
        }
        
        // Initialize global input instance
        const Input = new InputController();

        // --- NETWORK SIMULATOR (Using Render Link) ---
        class NetworkService {
            constructor(url) {
                this.endpoint = url;
                this.connected = false;
                this.mockPeers = [];
            }
            
            connect(room, username) {
                console.log(`[NETWORK] Negotiating with ${this.endpoint}`);
                setTimeout(() => {
                    this.connected = true;
                    this.seedMockPeers(room);
                }, 600);
            }
            
            seedMockPeers(room) {
                if(!room) return; 
                const names = ["TemuWarrior", "BuildPro99", "NoScopeGod", "LootGoblin"];
                const count = Math.min(3, Math.max(1, room.length % 4));

                    State.actors.set(peer.id, peer);
                    this.mockPeers.push(peer);
                }
            }
            
            sync(delta) {
                if(!this.connected) return;
                this.mockPeers.forEach(peer => {
                    if(peer.isDead) return;
                    if(Math.random() < 0.015) {
                        peer.targetDir = new THREE.Vector3((Math.random()-0.5)*2, 0, (Math.random()-0.5)*2).normalize();
                        peer.targetRot = Math.atan2(peer.targetDir.x, peer.targetDir.z);
                    }
                    if(peer.targetDir) {
                        peer.velocity.x = peer.targetDir.x * peer.speed * 0.8;
                        peer.velocity.z = peer.targetDir.z * peer.speed * 0.8;
                        peer.mesh.rotation.y = THREE.MathUtils.lerp(peer.mesh.rotation.y, peer.targetRot, 0.1);
                    }
                    peer.update(delta);
                });
            }

        // --- PROCEDURAL WORLD GENERATION (EXPANDED FORESTRY & GRASS) ---
        class WorldBuilder {
            constructor() {
                this.buildTerrain();
                this.buildWalls();
                this.scatterForest();
                this.generateTallGrass();
            }

            buildTerrain() {
                const geo = new THREE.PlaneGeometry(CONFIG.WORLD_SIZE, CONFIG.WORLD_SIZE, 128, 128);
                const pos = geo.attributes.position;
                
                // Advanced procedural noise for terrain heightmap
                for (let i = 0; i < pos.count; i++) {
                    let x = pos.getX(i);
                    let y = pos.getY(i);
                    let dist = Math.sqrt(x*x + y*y);
                    
                    // Create a flat center arena, rolling hills outwards
                    if (dist > 60) {
                        let elevation = Math.sin(x * 0.02) * Math.cos(y * 0.02) * 6.0;
                        elevation += Math.sin(x * 0.008 + y * 0.015) * 12.0;
                        
                        // Add some sharp rocks/peaks
                        if(Math.abs(Math.sin(x*0.1)*Math.cos(y*0.1)) > 0.8) {
                            elevation += 5.0;
                        }
                        pos.setZ(i, elevation);
                    }
                }
                
                geo.computeVertexNormals();
                const mat = new THREE.MeshStandardMaterial({ 
                    color: CONFIG.COLORS.GROUND, 
                    roughness: 0.9, 
                    metalness: 0.05,
                    flatShading: true 
                });
                
                const ground = new THREE.Mesh(geo, mat);
                ground.rotation.x = -Math.PI / 2;
                ground.receiveShadow = true;
                scene.add(ground);
            }

            scatterForest() {
                const treeMatWood = new THREE.MeshStandardMaterial({ color: CONFIG.COLORS.WOOD, roughness: 1.0 });
                const treeMatLeaves = new THREE.MeshStandardMaterial({ color: CONFIG.COLORS.LEAVES, roughness: 0.9, flatShading: true });
                
                const pineGeo = new THREE.ConeGeometry(4, 12, 5);
                const trunkGeo = new THREE.CylinderGeometry(0.8, 1.2, 4, 6);
                const oakGeo = new THREE.DodecahedronGeometry(5, 1);

                for (let i = 0; i < CONFIG.TREE_COUNT; i++) {
                    let rx = (Math.random() - 0.5) * (CONFIG.WORLD_SIZE - 40);
                    let rz = (Math.random() - 0.5) * (CONFIG.WORLD_SIZE - 40);
                    
                    if (Math.sqrt(rx*rx + rz*rz) < 50) continue; // Keep drop zone clear

                    const treeGrp = new THREE.Group();
                    treeGrp.position.set(rx, 0, rz);

                    // Add Trunk
                    const trunk = new THREE.Mesh(trunkGeo, treeMatWood);
                    trunk.position.y = 2;
                    trunk.castShadow = true;
                    trunk.receiveShadow = true;
                    treeGrp.add(trunk);

                    // Randomize Tree Type
                    if (Math.random() > 0.5) {
                        // Pine Tree
                        const leaves = new THREE.Mesh(pineGeo, treeMatLeaves);
                        leaves.position.y = 8;
                        leaves.castShadow = true;
                        treeGrp.add(leaves);
                    } else {
                        // Oak Tree
                        const leaves1 = new THREE.Mesh(oakGeo, treeMatLeaves);
                        leaves1.position.y = 7;
                        leaves1.castShadow = true;
                        treeGrp.add(leaves1);
                        
                        const leaves2 = new THREE.Mesh(oakGeo, treeMatLeaves);
                        leaves2.position.set(2, 6, 2);
                        leaves2.scale.set(0.7,0.7,0.7);
                        leaves2.castShadow = true;
                        treeGrp.add(leaves2);
                    }
                    
                    // Add random rotation and scale
                    treeGrp.rotation.y = Math.random() * Math.PI;
                    const s = 0.8 + Math.random() * 0.6;
                    treeGrp.scale.set(s,s,s);
                    
                    scene.add(treeGrp);
                    
                    // Register collision data
                    State.sceneryData.push({ x: rx, z: rz, radius: 1.5 * s });
                }
            }

            generateTallGrass() {
                // High performance InstancedMesh for thousands of grass blades
                const grassGeo = new THREE.PlaneGeometry(0.6, 2.5);
                grassGeo.translate(0, 1.25, 0); // Move pivot to bottom
                
                const grassMat = new THREE.MeshStandardMaterial({
                    color: 0x1a4519,
                    side: THREE.DoubleSide,
                    alphaTest: 0.5,
                    roughness: 1.0
                });

                const instancedGrass = new THREE.InstancedMesh(grassGeo, grassMat, CONFIG.GRASS_COUNT);
                instancedGrass.receiveShadow = true;

                const dummy = new THREE.Object3D();
                let placed = 0;

                while (placed < CONFIG.GRASS_COUNT) {
                    let rx = (Math.random() - 0.5) * CONFIG.WORLD_SIZE;
                    let rz = (Math.random() - 0.5) * CONFIG.WORLD_SIZE;
                    
                    // cluster grass somewhat near origin but spread out
                    dummy.position.set(rx, 0, rz);
                    dummy.rotation.y = Math.random() * Math.PI;
                    
                    // Randomize height slightly
                    const scaleY = 0.5 + Math.random() * 1.5;
                    dummy.scale.set(1, scaleY, 1);
                    
                    dummy.updateMatrix();
                    instancedGrass.setMatrixAt(placed, dummy.matrix);
                    placed++;
                }

                scene.add(instancedGrass);
            }

            buildWalls() {
                const border = CONFIG.WORLD_SIZE / 2;
                // Forcefield effect for world bounds
                const mat = new THREE.MeshStandardMaterial({ 
                    color: 0x0ea5e9, 
                    transparent: true, 
                    opacity: 0.15, 
                    side: THREE.DoubleSide,
                    emissive: 0x0ea5e9,
                    emissiveIntensity: 0.5
                });
                const geo = new THREE.PlaneGeometry(CONFIG.WORLD_SIZE, 200);
                
                const data = [
                    { p: [0, 100, border], r: [0,0,0] },
                    { p: [0, 100, -border], r: [0,0,0] },
                    { p: [border, 100, 0], r: [0, Math.PI/2, 0] },
                    { p: [-border, 100, 0], r: [0, Math.PI/2, 0] }
                ];

                data.forEach(d => {
                    const wall = new THREE.Mesh(geo, mat);
                    wall.position.set(...d.p);
                    wall.rotation.set(...d.r);
                    scene.add(wall);
                });
            }
        }

        // --- ENTITY SYSTEM: ACTORS & ANIMATIONS ---
        class Actor {
            constructor(id, name, colorCode) {
                this.id = id;
                this.name = name;
                this.health = 100;
                this.shield = 50;
                this.isDead = false;
                this.kills = 0;
                
                this.position = new THREE.Vector3();
                this.velocity = new THREE.Vector3();
                this.speed = 14.0; 
                this.isGrounded = true;
                
                this.weapon = WEAPON_TIERS.COMMON;
                this.lastFireTime = 0;
                this.animClock = 0;
                
                this.buildRig(colorCode);
            }

            buildRig(colorHex) {
                this.mesh = new THREE.Group();
                const matBody = new THREE.MeshStandardMaterial({ color: colorHex, roughness: 0.8 });
                const matSkin = new THREE.MeshStandardMaterial({ color: CONFIG.COLORS.SKIN, roughness: 0.7 });
                const matDark = new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.9 });

                this.torso = new THREE.Mesh(new THREE.BoxGeometry(1.6, 2.2, 0.8), matBody);
                this.torso.position.y = 2.4; 
                this.torso.castShadow = true;
                this.mesh.add(this.torso);

                this.head = new THREE.Mesh(new THREE.BoxGeometry(1.1, 1.1, 1.1), matSkin);
                this.head.position.y = 1.7;
                this.head.castShadow = true;
                this.torso.add(this.head);

                const visor = new THREE.Mesh(new THREE.BoxGeometry(1.12, 0.25, 0.3), matDark);
                visor.position.set(0, 0.1, 0.45);
                this.head.add(visor);

                const createLimb = (w, h, d, mat, px, py, pivotY) => {
                    const limb = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
                    limb.position.set(px, py, 0);
                    limb.geometry.translate(0, pivotY, 0); 
                    limb.castShadow = true;
                    this.torso.add(limb);
                    return limb;
                };

                this.armL = createLimb(0.5, 1.7, 0.5, matBody, -1.1, 0.8, -0.6);
                this.armR = createLimb(0.5, 1.7, 0.5, matBody, 1.1, 0.8, -0.6);
                this.legL = createLimb(0.65, 1.7, 0.65, matDark, -0.5, -1.1, -0.85);
                this.legR = createLimb(0.65, 1.7, 0.65, matDark, 0.5, -1.1, -0.85);

                this.weaponGroup = new THREE.Group();
                this.buildWeaponMesh();
                this.armR.add(this.weaponGroup);

                this.mesh.traverse(child => { if(child.isMesh) child.userData = { parentActor: this }; });
                scene.add(this.mesh);
            }

            buildWeaponMesh() {
                this.weaponGroup.clear();
                const matBase = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.5 });
                const matAccent = new THREE.MeshStandardMaterial({ 
                    color: this.weapon.color, 
                    emissive: this.weapon.color, 
                    emissiveIntensity: 0.8 
                });
                
                const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 2.0, 8), matBase);
                barrel.rotation.x = Math.PI / 2;
                barrel.position.set(0, -1.1, 1.0);
                
                const body = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.6, 1.2), matBase);
                body.position.set(0, -1.1, 0);
                
                const scope = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.25, 0.5), matAccent);
                scope.position.set(0, -0.75, 0.2);

                this.weaponGroup.add(barrel, body, scope);
                this.muzzlePoint = barrel; 
            }

            equipWeapon(weaponObj) {
                this.weapon = weaponObj;
                this.buildWeaponMesh();
                if(this === State.localPlayer) updateHUD();
            }

            applyDamage(amount, instigator) {
                if (this.isDead) return;
                
                if (this.shield > 0) {
                    this.shield -= amount;
                    if (this.shield < 0) {
                        this.health += this.shield; 
                        this.shield = 0;
                    }
                } else {
                    this.health -= amount;
                }

                VFX.spawnDamageNumbers(this.mesh.position, amount, this.shield > 0 ? 0x60a5fa : 0xff2222);

                if (this === State.localPlayer) {
                    updateHUD();
                    gsap.fromTo(".hud-layer", { backgroundColor: "rgba(255,0,0,0.4)" }, { backgroundColor: "rgba(255,0,0,0)", duration: 0.6 });
                }

                if (this.health <= 0) {
                    this.die(instigator);
                }
            }

            die(killer) {
                this.isDead = true;
                this.health = 0;
                
                // Advanced Ragdoll simulation
                gsap.to(this.mesh.rotation, { x: -Math.PI/2, z: (Math.random()-0.5), duration: 0.6, ease: "bounce.out" });
                gsap.to(this.mesh.position, { y: -1, duration: 0.6 });
                
                // Drop loot effect
                VFX.createImpact(this.mesh.position, this.weapon.color, 15);
                
                if (killer) {
                    killer.kills++;
                    announceKill(killer.name, this.name, killer.weapon.name);
                    updateLeaderboard();
                }

                if (this === State.localPlayer) {
                    setTimeout(() => triggerGameOver(), 2500);
                } else {
                    setTimeout(() => {
                        scene.remove(this.mesh);
                        State.actors.delete(this.id);
                    }, 4000);
                }
            }

            updatePhysics(delta) {
                if (!this.isGrounded) {
                    this.velocity.y -= CONFIG.GRAVITY * delta;
                }
                
                this.mesh.position.addScaledVector(this.velocity, delta);

                // Basic Floor Collision
                if (this.mesh.position.y <= 0) {
                    this.mesh.position.y = 0;
                    this.velocity.y = 0;
                    this.isGrounded = true;
                }

                // World Boundary
                const b = CONFIG.WORLD_SIZE / 2 - 2;
                this.mesh.position.x = THREE.MathUtils.clamp(this.mesh.position.x, -b, b);
                this.mesh.position.z = THREE.MathUtils.clamp(this.mesh.position.z, -b, b);

                // Scenery Collisions (Trees)
                State.sceneryData.forEach(obj => {
                    const dx = this.mesh.position.x - obj.x;
                    const dz = this.mesh.position.z - obj.z;
                    const dist = Math.sqrt(dx*dx + dz*dz);
                    if (dist < obj.radius + 1.2) {
                        const push = (obj.radius + 1.2 - dist);
                        const nx = dx / dist; const nz = dz / dist;
                        this.mesh.position.x += nx * push;
                        this.mesh.position.z += nz * push;
                    }
                });
            }

            updateAnimation(delta) {
                const speed2D = Math.sqrt(this.velocity.x**2 + this.velocity.z**2);
                const isMoving = speed2D > 0.5;

                if (isMoving) {
                    this.animClock += delta * speed2D * 1.1;
                    this.legL.rotation.x = Math.sin(this.animClock) * 0.9;
                    this.legR.rotation.x = Math.sin(this.animClock + Math.PI) * 0.9;
                    this.armL.rotation.x = Math.sin(this.animClock + Math.PI) * 0.6;
                    
                    // Aiming arm stabilization while running
                    this.armR.rotation.x = THREE.MathUtils.lerp(this.armR.rotation.x, -Math.PI/2.2, 0.2);
                    this.torso.position.y = 2.4 + Math.abs(Math.sin(this.animClock * 2)) * 0.2;
                } else {
                    this.legL.rotation.x = THREE.MathUtils.lerp(this.legL.rotation.x, 0, 0.1);
                    this.legR.rotation.x = THREE.MathUtils.lerp(this.legR.rotation.x, 0, 0.1);
                    this.armL.rotation.x = THREE.MathUtils.lerp(this.armL.rotation.x, 0, 0.1);
                    this.armR.rotation.x = THREE.MathUtils.lerp(this.armR.rotation.x, -Math.PI/2.1, 0.1);
                    
                    this.animClock += delta * 1.5;
                    this.torso.position.y = 2.4 + Math.sin(this.animClock) * 0.06;
                }
            }

            fireWeapon(targetVec) {
                const now = State.clock.getElapsedTime();
                if (now - this.lastFireTime < this.weapon.cooldown) return;
                this.lastFireTime = now;

                // Sharp recoil animation
                gsap.fromTo(this.armR.rotation, { x: -Math.PI/1.7 }, { x: -Math.PI/2.1, duration: 0.15 });

                const origin = new THREE.Vector3();
                this.muzzlePoint.getWorldPosition(origin);
                
                // Base direction
                const baseDir = new THREE.Vector3().subVectors(targetVec, origin).normalize();
                
                // Multi-shot logic based on tier
                for(let i=0; i < this.weapon.moves; i++) { 
                    
                    // Apply weapon spread
                    const spreadDir = new THREE.Vector3().copy(baseDir);
                    spreadDir.x += (Math.random()-0.5) * this.weapon.spread;
                    spreadDir.y += (Math.random()-0.5) * this.weapon.spread;
                    spreadDir.z += (Math.random()-0.5) * this.weapon.spread;
                    spreadDir.normalize();

                    const ray = new THREE.Raycaster(origin, spreadDir);
                    const targets = [];
                    State.actors.forEach(actor => {
                        if (actor !== this && !actor.isDead) {
                            actor.mesh.children.forEach(c => targets.push(c));
                        }
                    });

                    const hits = ray.intersectObjects(targets, true);
                    let endPoint = new THREE.Vector3().copy(origin).addScaledVector(spreadDir, 150);
                    let hitActor = null;

                    if (hits.length > 0) {
                        endPoint.copy(hits[0].point);
                        if (hits[0].object.userData.parentActor) {
                            hitActor = hits[0].object.userData.parentActor;
                        }
                    }

                    VFX.createTracer(origin, endPoint, this.weapon.color);
                    VFX.createImpact(endPoint, hitActor ? 0xff2222 : 0xffffaa);

                    if (hitActor) {
                        // Calculate damage falloff over distance
                        const dist = origin.distanceTo(endPoint);
                        let finalDamage = this.weapon.damage;
                        if(dist > 50) finalDamage *= 0.7;
                        
                        hitActor.applyDamage(finalDamage, this);
                    }
                }
            }

            update(delta) {
                if (this.isDead) return;
                this.updatePhysics(delta);
                this.updateAnimation(delta);
            }
        }

        // Subclass: Local Player Controller
        class PlayerActor extends Actor {
            constructor(id, name) {
                super(id, name, 0x1e3a8a); // Dark blue for player
            }

            processInputs(delta) {
                const moveVec = new THREE.Vector3();
                
                // Input maps directly from the new InputController (Touch Joystick or WASD)
                const z = Input.backward - Input.forward;
                const x = Input.right - Input.left;
                
                moveVec.set(x, 0, z);

                // Orient movement relative to the current CAMERA angle (Theta)
                moveVec.applyAxisAngle(new THREE.Vector3(0,1,0), State.cameraTheta);
                
                if (moveVec.length() > 1) moveVec.normalize();
                
                this.velocity.x = moveVec.x * this.speed;
                this.velocity.z = moveVec.z * this.speed;
                
                // Turn mesh to face movement direction (if not aiming in FPS)
                if (moveVec.lengthSq() > 0.01 && State.cameraDistance > 0) {
                    const targetRot = Math.atan2(moveVec.x, moveVec.z);
                    let diff = targetRot - this.mesh.rotation.y;
                    while (diff < -Math.PI) diff += Math.PI * 2;
                    while (diff > Math.PI) diff -= Math.PI * 2;
                    this.mesh.rotation.y += diff * 12 * delta;
                }

                // Jump logic
                if (Input.jump && this.isGrounded) {
                    this.velocity.y = 15.0; // Higher jump
                    this.isGrounded = false;
                    Input.jump = false; 
                }

                // Firing logic
                if (Input.fire) {
                    // Center of screen raycast
                    const raycaster = new THREE.Raycaster();
                    raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
                    const aimPoint = new THREE.Vector3().copy(raycaster.ray.origin).addScaledVector(raycaster.ray.direction, 80);
                    
                    // In TPS, force player to rotate towards the crosshair while shooting
                    if (State.cameraDistance > 0) {
                        const aimDir = new THREE.Vector3().subVectors(aimPoint, this.mesh.position);
                        const tRot = Math.atan2(aimDir.x, aimDir.z);
                        let d = tRot - this.mesh.rotation.y;
                        while (d < -Math.PI) d += Math.PI * 2;
                        while (d > Math.PI) d -= Math.PI * 2;
                        this.mesh.rotation.y += d * 15 * delta;
                    }

                    this.fireWeapon(aimPoint);
                }
            }

            update(delta) {
                if(!this.isDead) this.processInputs(delta);
                super.update(delta);
            }
        }

        // Subclass: Advanced AI
        class BotAI extends Actor {
            constructor(id) {
                super(id, "Bot_" + Math.floor(Math.random()*9999), CONFIG.COLORS.ENEMY_SKIN);
                
                this.aiState = "WANDER";
                this.targetActor = null;
                this.destPoint = new THREE.Vector3();
                this.stateTimer = 0;
                
                // Bot weapon randomization
                const roll = Math.random();
                if(roll > 0.95) this.equipWeapon(WEAPON_TIERS.LEGENDARY_INFERNO);
                else if(roll > 0.8) this.equipWeapon(WEAPON_TIERS.LEGENDARY_SPEED);
                else if(roll > 0.5) this.equipWeapon(WEAPON_TIERS.RARE);
                else this.equipWeapon(WEAPON_TIERS.COMMON);

                this.pickRandomDestination(30);
            }

            pickRandomDestination(radius) {
                const angle = Math.random() * Math.PI * 2;
                this.destPoint.set(
                    this.mesh.position.x + Math.cos(angle) * radius,
                    0,
                    this.mesh.position.z + Math.sin(angle) * radius
                );
            }

            processLogic(delta) {
                this.stateTimer += delta;
                let nearestDist = 9999;
                this.targetActor = null;

                // Vision Sphere Check
                State.actors.forEach(actor => {
                    if (actor === this || actor.isDead) return;
                    const d = this.mesh.position.distanceTo(actor.mesh.position);
                    if (d < 70 && d < nearestDist) {
                        nearestDist = d;
                        this.targetActor = actor;
                    }
                });

                // State Machine Transition
                if (this.targetActor) {
                    if (this.health < 30 && nearestDist < 20) {
                        this.aiState = "FLEE";
                    } else if (nearestDist < 30) {
                        this.aiState = "ATTACK";
                    } else {
                        this.aiState = "CHASE";
                    }
                } else {
                    this.aiState = "WANDER";
                }

                // Execute State Logic
                let moveTarget = new THREE.Vector3();

                switch (this.aiState) {
                    case "WANDER":
                        this.speed = 5.0;
                        if (this.mesh.position.distanceTo(this.destPoint) < 3 || this.stateTimer > 6) {
                            this.pickRandomDestination(40);
                            this.stateTimer = 0;
                        }
                        moveTarget.copy(this.destPoint);
                        break;
                    
                    case "CHASE":
                        this.speed = 12.0;
                        moveTarget.copy(this.targetActor.mesh.position);
                        break;

                    case "FLEE":
                        this.speed = 14.0; // Sprint away
                        const fleeDir = new THREE.Vector3().subVectors(this.mesh.position, this.targetActor.mesh.position).normalize();
                        moveTarget.copy(this.mesh.position).addScaledVector(fleeDir, 20);
                        break;
                    
                    case "ATTACK":
                        this.speed = 3.0; // Strafe slowly
                        
                        // Strafe logic
                        if (this.stateTimer > 2) {
                            this.pickRandomDestination(10);
                            this.stateTimer = 0;
                        }
                        moveTarget.copy(this.destPoint);
                        
                        // Aim and Fire
                        const aimPoint = new THREE.Vector3().copy(this.targetActor.mesh.position);
                        aimPoint.y += 1.5; 
                        
                        // Artificial inaccuracy based on distance
                        const err = nearestDist * 0.05;
                        aimPoint.x += (Math.random()-0.5)*err;
                        aimPoint.z += (Math.random()-0.5)*err;

                        const aimDir = new THREE.Vector3().subVectors(aimPoint, this.mesh.position);
                        this.mesh.rotation.y = Math.atan2(aimDir.x, aimDir.z);

                        this.fireWeapon(aimPoint);
                        break;
                }

                // Vector Movement Application
                if(this.aiState !== "ATTACK" || nearestDist > 15) {
                    const dir = new THREE.Vector3().subVectors(moveTarget, this.mesh.position);
                    dir.y = 0;
                    if(dir.lengthSq() > 0.1) {
                        dir.normalize();
                        this.velocity.x = dir.x * this.speed;
                        this.velocity.z = dir.z * this.speed;
                        
                        const targetRot = Math.atan2(dir.x, dir.z);
                        let diff = targetRot - this.mesh.rotation.y;
                        while(diff < -Math.PI) diff += Math.PI*2;
                        while(diff > Math.PI) diff -= Math.PI*2;
                        this.mesh.rotation.y += diff * 6 * delta;
                    }
                } else {
                    this.velocity.x = 0; this.velocity.z = 0;
                }
            }

            update(delta) {
                if(!this.isDead) this.processLogic(delta);
                super.update(delta);
            }
        }


        // --- VISUAL EFFECTS (VFX) MANAGER ---
        const VFX = {
            createTracer: (start, end, colorHex) => {
                const geo = new THREE.BufferGeometry().setFromPoints([start, end]);
                const mat = new THREE.LineBasicMaterial({ color: colorHex, linewidth: 4, transparent: true, opacity: 0.9 });
                const line = new THREE.Line(geo, mat);
                scene.add(line);
                State.projectiles.push({ mesh: line, life: 0.08 }); // Fast decay
            },

            createImpact: (pos, colorHex, amount = 6) => {
                const geo = new THREE.BoxGeometry(0.25, 0.25, 0.25);
                const mat = new THREE.MeshBasicMaterial({ color: colorHex });
                for(let i=0; i<amount; i++){
                    const p = new THREE.Mesh(geo, mat);
                    p.position.copy(pos);
                    p.velocity = new THREE.Vector3((Math.random()-0.5)*15, Math.random()*15, (Math.random()-0.5)*15);
                    scene.add(p);
                    State.particles.push({ mesh: p, life: 0.5, vel: p.velocity });
                }
            },

            spawnDamageNumbers: (pos, amount, colorHex) => {
                const el = document.createElement('div');
                el.innerText = `-${Math.floor(amount)}`;
                el.style.position = 'absolute';
                el.style.color = '#' + colorHex.toString(16).padStart(6, '0');
                el.style.fontWeight = '900';
                el.style.fontSize = '26px';
                el.style.pointerEvents = 'none';
                el.style.textShadow = '3px 3px 0 #000';
                el.style.zIndex = '50';
                document.body.appendChild(el);

                const tempV = new THREE.Vector3().copy(pos);
                tempV.y += 3.5; 
                tempV.project(camera);
                
                const x = (tempV.x * .5 + .5) * window.innerWidth;
                const y = (tempV.y * -.5 + .5) * window.innerHeight;
                
                el.style.left = `${x}px`;
                el.style.top = `${y}px`;

                gsap.to(el, {
                    top: y - 60,
                    opacity: 0,
                    scale: 1.5,
                    duration: 0.8,
                    ease: "power2.out",
                    onComplete: () => el.remove()
                });
            },

            updateSystems: (delta) => {
                for(let i = State.projectiles.length-1; i>=0; i--){
                    let p = State.projectiles[i];
                    p.life -= delta;
                    if(p.life <= 0){
                        scene.remove(p.mesh);
                        p.mesh.geometry.dispose();
                        p.mesh.material.dispose();
                        State.projectiles.splice(i, 1);
                    }
                }
                for(let i = State.particles.length-1; i>=0; i--){
                    let p = State.particles[i];
                    p.life -= delta;
                    p.mesh.position.addScaledVector(p.vel, delta);
                    p.vel.y -= CONFIG.GRAVITY * delta;
                    if(p.life <= 0){
                        scene.remove(p.mesh);
                        p.mesh.geometry.dispose();
                        p.mesh.material.dispose();
                        State.particles.splice(i, 1);
                    }
                }
            }
        };


        // --- UI UPDATERS ---
        function updateHUD() {
            if(!State.localPlayer) return;
            document.getElementById('ui-health').innerText = `HP: ${Math.floor(State.localPlayer.health)}`;
            document.getElementById('ui-shield').innerText = `SHIELD: ${Math.floor(State.localPlayer.shield)}`;
            
            const wName = State.localPlayer.weapon.name;
            const wType = State.localPlayer.weapon.type;
            document.getElementById('ui-weapon').innerHTML = `WEAPON: <span class="tier-${wType}">${wName}</span>`;
        }

        function updateLeaderboard() {
            const arr = Array.from(State.actors.values()).map(a => ({name: a.name, k: a.kills}));
            arr.sort((a,b) => b.k - a.k);
            
            let html = '';
            for(let i=0; i<Math.min(5, arr.length); i++){
                html += `<div class="lb-entry"><span>${arr[i].name}</span><strong>${arr[i].k}</strong></div>`;
            }
            document.getElementById('leaderboard-data').innerHTML = html;
        }

        function announceKill(killer, victim, weapon) {
            const el = document.createElement('div');
            el.className = 'kill-msg';
            el.innerHTML = `<span style="color:var(--theme-primary)">${killer}</span> 💥 <span style="color:#ef4444">${victim}</span>`;
            document.getElementById('killfeed').appendChild(el);
            gsap.fromTo(el, {opacity: 0, scale: 0.5}, {opacity: 1, scale: 1, duration: 0.3, ease: "back.out"});
            
            setTimeout(() => {
                gsap.to(el, {opacity: 0, y: -20, duration: 0.5, onComplete: ()=>el.remove()});
            }, 3500);
        }

        // --- DYNAMIC CAMERA RIG (Roblox-style Orbit & Zoom) ---
        function processCameraRig() {
            if(!State.localPlayer || State.localPlayer.isDead) return;
            
            const playerPos = State.localPlayer.mesh.position;
            
            // Calculate spherical coordinates for orbit
            const xOffset = State.cameraDistance * Math.sin(State.cameraPhi) * Math.sin(State.cameraTheta);
            const yOffset = State.cameraDistance * Math.cos(State.cameraPhi);
            const zOffset = State.cameraDistance * Math.sin(State.cameraPhi) * Math.cos(State.cameraTheta);

            const targetCamPos = new THREE.Vector3(
                playerPos.x + xOffset,
                playerPos.y + 2.0 + yOffset, // Offset above head
                playerPos.z + zOffset
            );

            // Basic Camera Collision with floor
            if (targetCamPos.y < 0.5) targetCamPos.y = 0.5;

            // Smooth interpolation
            camera.position.lerp(targetCamPos, 0.3);

            if (State.cameraDistance === 0) {
                // First Person Mode
                const lookDir = new THREE.Vector3(0,0,1)
                    .applyAxisAngle(new THREE.Vector3(1,0,0), State.cameraPhi - Math.PI/2)
                    .applyAxisAngle(new THREE.Vector3(0,1,0), State.cameraTheta);
                
                camera.lookAt(new THREE.Vector3().copy(camera.position).add(lookDir));
                
                // Make player invisible to self in FPS
                State.localPlayer.mesh.visible = false;
            } else {
                // Third Person Orbit Mode
                const lookTarget = new THREE.Vector3().copy(playerPos);
                lookTarget.y += 2.0; 
                camera.lookAt(lookTarget);
                
                State.localPlayer.mesh.visible = true;
            }
        }


        // --- MAIN ENGINE LOOP ---
        function startGameLoop() {
            new WorldBuilder();
            requestAnimationFrame(engineTick);
        }

        function engineTick() {
            requestAnimationFrame(engineTick);

            if (!State.active) return;

            const delta = Math.min(State.clock.getDelta(), 0.1);

            // Update Entities
            State.actors.forEach(actor => actor.update(delta));

            // Bot Spawner
            State.spawnTimer += delta;
            let botCount = 0;
            State.actors.forEach(a => { if(a instanceof BotAI) botCount++; });
            
            if (State.spawnTimer >= CONFIG.SPAWN_RATE && botCount < CONFIG.MAX_BOTS) {
                State.spawnTimer = 0;
                const newBot = new BotAI(`BOT_${Date.now()}`);
                
                let angle = Math.random() * Math.PI*2;
                let r = 60 + Math.random()*80;
                let sx = State.localPlayer.mesh.position.x + Math.cos(angle)*r;
                let sz = State.localPlayer.mesh.position.z + Math.sin(angle)*r;
                
                const max = CONFIG.WORLD_SIZE/2 - 10;
                newBot.mesh.position.set(
                    THREE.MathUtils.clamp(sx, -max, max), 
                    15, // Drop from sky
                    THREE.MathUtils.clamp(sz, -max, max)
                );
                State.actors.set(newBot.id, newBot);
            }

            // Sync, VFX, and Render
            Network.sync(delta);
            VFX.updateSystems(delta);
            processCameraRig();
            renderer.render(scene, camera);
        }

        function triggerGameOver() {
            State.active = false;
            document.exitPointerLock();
            
            const p = document.getElementById('main-panel');
            p.innerHTML = `
                <h1 class="title-glitch" style="color: #ef4444;">ELIMINATED</h1>
                <p class="subtitle">Squad Rank: #2</p>
                <h2 style="color:var(--theme-primary); margin: 25px 0; font-size: 2rem;">Total Kills: ${State.localPlayer.kills}</h2>
                <button class="btn-primary" onclick="location.reload()">RETURN TO LOBBY</button>
            `;
            
            document.getElementById('lobby-overlay').style.display = 'flex';
            gsap.fromTo(p, {scale: 0.5, opacity: 0}, {scale: 1, opacity: 1, duration: 0.6, ease: "back.out(1.5)"});
        }

        // --- MENU LOGIC ---
        window.onload = () => {
            gsap.to('.main-panel', { opacity: 1, scale: 1, duration: 0.8, ease: "power3.out" });

            document.getElementById('btn-copy-link').addEventListener('click', () => {
                navigator.clipboard.writeText(CONFIG.RENDER_URL).then(() => {
                    const toast = document.getElementById('link-toast');
                    toast.style.display = 'block';
                    setTimeout(() => { toast.style.display = 'none'; }, 2500);
                });
            });

            document.getElementById('btn-deploy').addEventListener('click', () => {
                const name = document.getElementById('player-name').value || "Guest";
                State.roomCode = document.getElementById('room-code').value.toUpperCase();

                State.localPlayer = new PlayerActor('LOCAL_PLAYER', name);
                
                // Equip random legendary to showcase mechanics
                const legs = [WEAPON_TIERS.LEGENDARY_ELECTRO, WEAPON_TIERS.LEGENDARY_INFERNO, WEAPON_TIERS.LEGENDARY_DELUGE, WEAPON_TIERS.LEGENDARY_GLACIER, WEAPON_TIERS.LEGENDARY_SPEED];
                State.localPlayer.equipWeapon(legs[Math.floor(Math.random() * legs.length)]);
                State.actors.set('LOCAL_PLAYER', State.localPlayer);
                
                Network.connect(State.roomCode, name);

                updateHUD();
                updateLeaderboard();

                gsap.to('#lobby-overlay', { 
                    opacity: 0, 
                    duration: 0.5, 
                    onComplete: () => {
                        document.getElementById('lobby-overlay').style.display = 'none';
                        State.active = true;
                        State.clock.start();
                        startGameLoop();
                    } 
                });
            });
        };
    </script>
</body>
